<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레버리지 게이지 v14 · Extreme Quant Edition</title>
<!--
  ⚠ 원본 index.html L1~31 헤더 + L579~830 HTML 구조를 여기에 이식
  ⚠ <style> 태그 제거 (→ src/styles/main.css 로 이동)
  ⚠ <script> 태그 제거 (→ src/main.js 로 이동)
  ⚠ Google Fonts <link> 유지
-->

<!-- Google Fonts — 원본과 동일 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- PWA Manifest (vite-plugin-pwa가 자동 주입) -->
</head>
<body>

<!--
  ⚠ 마이그레이션 지시:
  원본 index.html 의 <body> 내용 (L579~830, <script> 태그 제외)을
  그대로 여기에 붙여넣으세요.

  변경 사항:
  1. <style> 블록 → src/styles/main.css
  2. <script> 블록 → src/main.js
  3. onclick="xxx()" 인라인 핸들러는 유지 (main.js에서 window.xxx = xxx로 노출)

  아래는 구조 가이드만 포함:
-->

<!-- 로딩 스크린 -->
<div id="loadScreen">
  <div class="load-inner">
    <div class="load-logo">LEVERAGE GAUGE <span>v14</span></div>
    <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
    <div class="load-msg" id="loadMsg">INITIALIZING...</div>
  </div>
</div>

<!-- 앱 메인 -->
<div id="app" style="display:none">
  <!-- 원본 HTML 구조 그대로 이식 -->
</div>

<!-- 코인 상세 모달 -->
<div id="coinModal">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">--</div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <nav class="modal-tabs" id="modalTabs">
      <button class="mtab active" data-tab="tech">📊 기술지표</button>
      <button class="mtab" data-tab="whale">🐋 세력</button>
      <button class="mtab" data-tab="heatmap">🔥 Heatmap</button>
      <button class="mtab" data-tab="backtest">⚡ 백테스트</button>
      <button class="mtab" data-tab="sim">💰 시뮬레이터</button>
    </nav>
    <div class="modal-body" id="modalBody">
      <div class="tab-panel active" id="tab-tech"></div>
      <div class="tab-panel" id="tab-whale"></div>
      <div class="tab-panel" id="tab-heatmap"></div>
      <div class="tab-panel" id="tab-backtest"></div>
      <div class="tab-panel" id="tab-sim"></div>
    </div>
  </div>
</div>

<!-- Vite 엔트리포인트 — 원본 <script> 블록 대체 -->
<script type="module" src="/src/main.js"></script>

</body>
</html>
