<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07090f">
<title>레버리지 게이지 v17.1 · 복합지표 시스템 (Futures Fix)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --panel:#0d1117;
  --border:rgba(255,255,255,0.08);
  --accent:#00e5ff;
  --accent2:#ff6b35;
  --green:#00ff88;
  --red:#ff3355;
  --yellow:#ffd700;
  --muted:#64748b;
  --text:#e2e8f0;
  --radius:12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,229,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.018) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
}

/* ━━━ 로딩 화면 ━━━ */
#loadScreen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.load-title {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  color: var(--accent);
  letter-spacing: 4px;
}

.load-bar-track {
  width: 260px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.load-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  width: 0;
  transition: width 0.1s;
}

.load-msg {
  font-family: 'Orbitron', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 2px;
}

.load-version {
  font-size: 0.52rem;
  color: var(--muted);
  opacity: 0.5;
  letter-spacing: 1px;
}

/* ━━━ 헤더 ━━━ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
}

header h1 {
  font-family: 'Orbitron', monospace;
  font-size: 0.66rem;
  color: var(--accent);
  letter-spacing: 1.5px;
  line-height: 1.4;
}

.hdr-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.live-dot {
  width: 7px;
  height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

#updateTime {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

.btn {
  background: rgba(0,229,255,0.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 5px 11px;
  border-radius: 6px;
  font-family: 'Orbitron', monospace;
  font-size: 0.70rem;
  cursor: pointer;
  min-height: 32px;
  letter-spacing: 1px;
  transition: all 0.15s;
}

.btn:hover {
  background: rgba(0,229,255,0.2);
}

/* ━━━ 상태바 ━━━ */
.status-bar {
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 0.54rem;
  margin-bottom: 10px;
  display: none;
  line-height: 1.5;
}

.status-bar.info {
  background: rgba(0,229,255,0.07);
  border: 1px solid rgba(0,229,255,0.2);
  color: var(--accent);
  display: block;
}

.status-bar.error {
  background: rgba(255,51,85,0.1);
  border: 1px solid rgba(255,51,85,0.3);
  color: var(--red);
  display: block;
}

/* ━━━ 패널 ━━━ */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'Orbitron', monospace;
  font-size: 0.60rem;
  letter-spacing: 2px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-body {
  padding: 12px 14px;
}

/* ━━━ 복합 게이지 ━━━ */
.composite-gauge {
  padding: 14px;
}

.gauge-header {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 12px;
}

.gauge-score {
  font-family: 'Orbitron', monospace;
  font-size: 3rem;
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 0 20px currentColor;
}

.gauge-info {
  flex: 1;
  padding-bottom: 6px;
}

.gauge-grade {
  font-size: 0.70rem;
  font-weight: 700;
  margin-bottom: 2px;
}

.gauge-subtitle {
  font-size: 0.54rem;
  color: var(--muted);
}

/* ━━━ 선형 게이지 바 ━━━ */
.linear-gauge-track {
  position: relative;
  height: 28px;
  border-radius: 14px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 8px;
}

.linear-gauge-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, 
    #5c0000 0%, 
    #b31010 20%, 
    #e05500 35%, 
    #e0a800 50%, 
    #28a845 65%, 
    #00cc55 80%, 
    #00ff88 100%
  );
  opacity: 0.15;
}

.linear-gauge-fill {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  border-radius: 14px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  z-index: 2;
}

.linear-gauge-zones {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  z-index: 4;
  pointer-events: none;
}

.linear-gauge-zones span {
  position: absolute;
  font-family: 'Orbitron', monospace;
  font-size: 0.52rem;
  color: rgba(255,255,255,0.5);
  transform: translateX(-50%);
  font-weight: 700;
}

.gauge-labels {
  display: flex;
  justify-content: space-between;
  padding: 0 2px;
  margin-bottom: 12px;
}

.gauge-labels span {
  font-family: 'Orbitron', monospace;
  font-size: 0.54rem;
  color: var(--muted);
}

/* ━━━ 지표 분해 ━━━ */
.indicators-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.indicator-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 11px;
}

.ind-label {
  font-size: 0.56rem;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ind-value {
  font-family: 'Orbitron', monospace;
  font-size: 0.70rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}

.ind-weight {
  font-size: 0.52rem;
  color: var(--muted);
  margin-top: 2px;
}

.ind-bar {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}

.ind-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ━━━ 통계 카드 ━━━ */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.slabel {
  font-size: 0.54rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sval {
  font-family: 'Orbitron', monospace;
  font-size: 1.02rem;
  font-weight: 700;
}

.schg {
  font-size: 0.58rem;
  margin-top: 2px;
}

/* ━━━ 롱숏 패널 ━━━ */
.ls-panel {
  padding: 12px 14px;
}

.ls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.ls-bar-track {
  position: relative;
  height: 20px;
  border-radius: 10px;
  overflow: hidden;
  background: var(--red);
  margin-bottom: 10px;
}

.ls-bar-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--green);
  transition: width 0.7s;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
}

.ls-long-inside {
  font-family: 'Orbitron', monospace;
  font-size: 0.70rem;
  font-weight: 700;
  color: #000;
}

.ls-short-inside {
  position: absolute;
  right: 7px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Orbitron', monospace;
  font-size: 0.70rem;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
}

/* ━━━ 예측 패널 ━━━ */
.pred-panel {
  padding: 12px 14px;
}

.day-row {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 10px;
}

.day-item {
  display: grid;
  grid-template-columns: 38px 1fr 54px 48px;
  align-items: center;
  gap: 8px;
}

.day-tag {
  font-family: 'Orbitron', monospace;
  font-size: 0.66rem;
  color: var(--muted);
  text-align: right;
}

.mini-bar-wrap {
  position: relative;
  height: 14px;
  border-radius: 7px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
}

.mini-bar-fill {
  height: 100%;
  border-radius: 7px;
  transition: width 0.5s ease;
}

.day-dir {
  font-size: 0.52rem;
  font-weight: 700;
  text-align: center;
}

.day-chg {
  font-family: 'Orbitron', monospace;
  font-size: 0.66rem;
  text-align: right;
}

.up { color: var(--green) !important; }
.down { color: var(--red) !important; }
.neu { color: var(--yellow) !important; }

/* ━━━ 코인 리스트 ━━━ */
.coin-section {
  margin-bottom: 10px;
}

.coin-card {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
}

.coin-card:hover {
  background: rgba(255,255,255,0.025);
}

.coin-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.coin-ico {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.56rem;
  font-weight: 700;
  color: var(--accent);
}

.csym {
  font-weight: 700;
  font-size: 0.52rem;
}

.cname {
  font-size: 0.56rem;
  color: var(--muted);
}

.coin-meta {
  display: flex;
  gap: 5px;
  margin-top: 3px;
  flex-wrap: wrap;
  font-size: 0.56rem;
}

.coin-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.gbadge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 5px;
  font-family: 'Orbitron', monospace;
  font-size: 0.70rem;
  font-weight: 900;
  border: 2px solid;
}

.gS {
  background: rgba(0,255,136,0.1);
  color: #00ff88;
  border-color: #00ff88;
  box-shadow: 0 0 6px rgba(0,255,136,0.28);
}

.gA {
  background: rgba(127,255,0,0.08);
  color: #7fff00;
  border-color: #7fff00;
}

.gB {
  background: rgba(255,215,0,0.08);
  color: #ffd700;
  border-color: #ffd700;
}

.gC {
  background: rgba(255,140,0,0.08);
  color: #ff8c00;
  border-color: #ff8c00;
}

.gD {
  background: rgba(255,68,68,0.08);
  color: #ff4444;
  border-color: #ff4444;
}

.gE {
  background: rgba(136,0,0,0.1);
  color: #cc2222;
  border-color: #880000;
}

.score-val {
  font-family: 'Orbitron', monospace;
  font-size: 0.66rem;
  font-weight: 700;
}

/* ━━━ 알림 뱃지 ━━━ */
.alert-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.52rem;
  font-weight: 700;
  margin-left: 6px;
}

.alert-extreme {
  background: rgba(255,51,85,0.12);
  color: var(--red);
  border: 1px solid rgba(255,51,85,0.3);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ━━━ 반응형 ━━━ */
@media (max-width: 380px) {
  .gauge-score {
    font-size: 2.4rem;
  }
  .indicators-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<!-- ━━━ 로딩 화면 ━━━ -->
<div id="loadScreen">
  <div class="load-title">LEVERAGE GAUGE</div>
  <div class="load-bar-track">
    <div class="load-bar-fill" id="loadBar"></div>
  </div>
  <div class="load-msg" id="loadMsg">INITIALIZING...</div>
  <div class="load-version">v17.1 복합지표 시스템 (Futures Fix)</div>
</div>

<!-- ━━━ 앱 본체 ━━━ -->
<div id="app" style="display:none">
<div class="wrap">

<!-- ━━━ 헤더 ━━━ -->
<header>
  <div>
    <h1>LEVERAGE GAUGE v17.1<br>복합 지표 시스템</h1>
  </div>
  <div class="hdr-right">
    <div class="live-dot"></div>
    <span id="updateTime">--:--:--</span>
    <button class="btn" id="refreshBtn" onclick="triggerRefresh()">↺ 갱신</button>
  </div>
</header>

<!-- ━━━ 상태바 ━━━ -->
<div class="status-bar" id="statusBar"></div>

<!-- ━━━ 복합 게이지 ━━━ -->
<div class="panel">
  <div class="composite-gauge">
    <div class="gauge-header">
      <div class="gauge-score" id="compositeScore">--</div>
      <div class="gauge-info">
        <div class="gauge-grade" id="compositeGrade">계산 중...</div>
        <div class="gauge-subtitle">복합 신호 점수 (0~100)</div>
      </div>
    </div>

    <!-- 선형 게이지 -->
    <div class="linear-gauge-track">
      <div class="linear-gauge-bg"></div>
      <div class="linear-gauge-fill" id="compositeFill"></div>
      <div class="linear-gauge-zones">
        <span style="left:10%">E</span>
        <span style="left:27.5%">D</span>
        <span style="left:42.5%">C</span>
        <span style="left:57.5%">B</span>
        <span style="left:72.5%">A</span>
        <span style="left:90%">S</span>
      </div>
    </div>

    <div class="gauge-labels">
      <span>극도 공포</span>
      <span>신중</span>
      <span>중립</span>
      <span>낙관</span>
      <span>과열</span>
      <span>극과열</span>
    </div>

    <!-- 지표 분해 -->
    <div class="indicators-grid" id="indicatorsGrid">
      <!-- 동적 생성 -->
    </div>
  </div>
</div>

<!-- ━━━ 시장 통계 ━━━ -->
<div class="stats-row">
  <div class="stat-card">
    <div class="slabel">BTC 도미넌스</div>
    <div class="sval" id="btcDom">--</div>
    <div class="schg" id="btcDomChg">--</div>
  </div>
  <div class="stat-card">
    <div class="slabel">총 시가총액</div>
    <div class="sval" id="totalMcap">--</div>
    <div class="schg" id="mcapChg">--</div>
  </div>
</div>

<!-- ━━━ 롱숏 비율 ━━━ -->
<div class="panel">
  <div class="panel-header">
    <span>LONG / SHORT RATIO</span>
    <span id="lsRatio" style="color:var(--accent);font-size:0.70rem">--</span>
  </div>
  <div class="ls-panel">
    <div class="ls-bar-track">
      <div class="ls-bar-fill" id="lsBarFill">
        <span class="ls-long-inside" id="lsLongPct">--</span>
      </div>
      <span class="ls-short-inside" id="lsShortPct">--</span>
    </div>
  </div>
</div>

<!-- ━━━ 7일 예측 ━━━ -->
<div class="panel">
  <div class="panel-header">
    <span>7 DAY MONTE CARLO PREDICTION</span>
    <span style="color:var(--accent);font-size:0.58rem">GARCH ON</span>
  </div>
  <div class="pred-panel">
    <div class="day-row" id="predRow">
      <!-- 동적 생성 -->
    </div>
  </div>
</div>

<!-- ━━━ TOP 코인 ━━━ -->
<div class="panel coin-section">
  <div class="panel-header">
    <span>TOP 20 COINS</span>
    <span id="coinCount" style="color:var(--muted);font-size:0.58rem">20</span>
  </div>
  <div id="coinList">
    <!-- 동적 생성 -->
  </div>
</div>

</div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// v17.1 복합 지표 시스템 (Futures Fix)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const STATE = {
  coins: [],
  btcData: null,
  marketData: null,
  longShortRatio: null,
  compositeScore: 0,
  indicators: {},
  lastUpdate: null
};

const CONFIG = {
  TOP_COINS: [
    'BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT',
    'DOGEUSDT','ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT',
    'MATICUSDT','LTCUSDT','TRXUSDT','UNIUSDT','ATOMUSDT',
    'ARBUSDT','OPUSDT','SUIUSDT','APTUSDT','HBARUSDT'
  ],
  
  // 복합 지표 가중치
  WEIGHTS: {
    PRICE_MOMENTUM: 0.35,    // 가격 모멘텀
    LEVERAGE_RATIO: 0.15,    // 레버리지 비율
    VOLUME_SURGE: 0.20,      // 거래량 급증
    LIQUIDATION_RISK: 0.15,  // 청산 위험
    FUNDING_RATE: 0.10,      // 펀딩비
    RSI_EXTREME: 0.05        // RSI 극단값
  },
  
  // 등급 임계값
  GRADES: {
    S: { min: 80, max: 100, label: 'S · 극과열', color: '#00ff88' },
    A: { min: 65, max: 80, label: 'A · 레버급증', color: '#7fff00' },
    B: { min: 50, max: 65, label: 'B · 낙관', color: '#ffd700' },
    C: { min: 35, max: 50, label: 'C · 중립', color: '#ff8c00' },
    D: { min: 20, max: 35, label: 'D · 신중', color: '#ff4444' },
    E: { min: 0, max: 20, label: 'E · 극도공포', color: '#cc2222' }
  }
};

// ━━━ 초기화 ━━━
async function init() {
  try {
    updateLoadProgress(20, '시장 데이터 로딩...');
    await loadMarketData();
    
    updateLoadProgress(40, '롱숏 비율 계산...');
    await loadLongShortRatio();
    
    updateLoadProgress(60, '복합 지표 분석...');
    await calculateCompositeScore();
    
    updateLoadProgress(80, 'TOP 코인 로딩...');
    await loadTopCoins();
    
    updateLoadProgress(100, '완료!');
    
    setTimeout(() => {
      document.getElementById('loadScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderUI();
    }, 300);
    
  } catch (err) {
    console.error('초기화 실패:', err);
    showError('데이터 로딩 실패. 새로고침 해주세요.');
  }
}

// ━━━ 로딩 진행률 ━━━
function updateLoadProgress(percent, msg) {
  document.getElementById('loadBar').style.width = percent + '%';
  document.getElementById('loadMsg').textContent = msg;
}

// ━━━ 시장 데이터 로딩 ━━━
async function loadMarketData() {
  try {
    // CoinGecko API (타임아웃 5초)
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    
    const resp = await fetch('https://api.coingecko.com/api/v3/global', {
      signal: controller.signal
    });
    clearTimeout(timeout);
    
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    
    const data = await resp.json();
    
    STATE.marketData = {
      totalMcap: data.data.total_market_cap.usd,
      btcDom: data.data.market_cap_percentage.btc,
      mcapChange24h: data.data.market_cap_change_percentage_24h_usd
    };
  } catch (err) {
    console.error('시장 데이터 로딩 실패:', err.message);
    // 폴백 데이터
    STATE.marketData = {
      totalMcap: 2395958000000,
      btcDom: 56.3,
      mcapChange24h: 0.01
    };
  }
}

// ━━━ 롱숏 비율 로딩 ━━━
async function loadLongShortRatio() {
  try {
    const resp = await fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=5m&limit=1');
    
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    
    const data = await resp.json();
    
    if (data && data[0]) {
      const longRatio = parseFloat(data[0].longAccount);
      const shortRatio = parseFloat(data[0].shortAccount);
      
      // 유효성 검사
      if (isNaN(longRatio) || isNaN(shortRatio)) {
        throw new Error('Invalid ratio data');
      }
      
      STATE.longShortRatio = {
        long: longRatio * 100,
        short: shortRatio * 100,
        ratio: longRatio / shortRatio
      };
    } else {
      throw new Error('Empty response');
    }
  } catch (err) {
    console.error('롱숏 비율 로딩 실패:', err.message);
    // 폴백
    STATE.longShortRatio = {
      long: 61.0,
      short: 39.0,
      ratio: 1.56
    };
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 복합 지표 계산 (핵심)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function calculateCompositeScore() {
  try {
    const indicators = {};
    
    // ① 가격 모멘텀 (1H, 4H 변화율)
    indicators.priceMomentum = await calculatePriceMomentum();
    
    // ② 레버리지 비율
    indicators.leverageRatio = calculateLeverageScore();
    
    // ③ 거래량 급증도
    indicators.volumeSurge = await calculateVolumeSurge();
    
    // ④ 청산 위험도 (OI 변화)
    indicators.liquidationRisk = await calculateLiquidationRisk();
    
    // ⑤ 펀딩비 과열도
    indicators.fundingRate = await calculateFundingScore();
    
    // ⑥ RSI 극단값
    indicators.rsiExtreme = await calculateRSIExtreme();
    
    STATE.indicators = indicators;
    
    // 최종 점수 계산
    const score = 
      (indicators.priceMomentum * CONFIG.WEIGHTS.PRICE_MOMENTUM) +
      (indicators.leverageRatio * CONFIG.WEIGHTS.LEVERAGE_RATIO) +
      (indicators.volumeSurge * CONFIG.WEIGHTS.VOLUME_SURGE) +
      (indicators.liquidationRisk * CONFIG.WEIGHTS.LIQUIDATION_RISK) +
      (indicators.fundingRate * CONFIG.WEIGHTS.FUNDING_RATE) +
      (indicators.rsiExtreme * CONFIG.WEIGHTS.RSI_EXTREME);
    
    STATE.compositeScore = Math.round(score);
    
  } catch (err) {
    console.error('복합 지표 계산 실패:', err);
    STATE.compositeScore = 50;
  }
}

// ━━━ ① 가격 모멘텀 계산 ━━━
async function calculatePriceMomentum() {
  try {
    // 1시간 캔들
    const resp1h = await fetch('https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=1h&limit=2');
    const data1h = await resp1h.json();
    
    const close1hPrev = parseFloat(data1h[0][4]);
    const close1hNow = parseFloat(data1h[1][4]);
    const change1h = ((close1hNow - close1hPrev) / close1hPrev) * 100;
    
    // 4시간 캔들
    const resp4h = await fetch('https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=4h&limit=2');
    const data4h = await resp4h.json();
    
    const close4hPrev = parseFloat(data4h[0][4]);
    const close4hNow = parseFloat(data4h[1][4]);
    const change4h = ((close4hNow - close4hPrev) / close4hPrev) * 100;
    
    // 점수 변환 (-5% ~ +5% → 0~100)
    const avgChange = (change1h + change4h) / 2;
    let score = 50 + (avgChange * 10);
    score = Math.max(0, Math.min(100, score));
    
    return score;
    
  } catch (err) {
    console.error('가격 모멘텀 계산 실패:', err);
    return 50;
  }
}

// ━━━ ② 레버리지 비율 점수 ━━━
function calculateLeverageScore() {
  if (!STATE.longShortRatio) return 50;
  
  const longPct = STATE.longShortRatio.long;
  
  // 롱 50% = 50점 기준
  // 롱 70% = 85점 (과열)
  // 롱 30% = 15점 (공포)
  let score = 50 + ((longPct - 50) * 1.75);
  score = Math.max(0, Math.min(100, score));
  
  return score;
}

// ━━━ ③ 거래량 급증도 ━━━
async function calculateVolumeSurge() {
  try {
    const resp = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=BTCUSDT');
    const data = await resp.json();
    
    const volume24h = parseFloat(data.volume);
    const volumeAvg = volume24h / 1.2; // 임시 평균 가정
    
    const ratio = volume24h / volumeAvg;
    
    // ratio 1.0 = 50점
    // ratio 2.0 = 100점
    // ratio 0.5 = 0점
    let score = (ratio - 0.5) * 100;
    score = Math.max(0, Math.min(100, score));
    
    return score;
    
  } catch (err) {
    console.error('거래량 계산 실패:', err);
    return 50;
  }
}

// ━━━ ④ 청산 위험도 (OI 변화) ━━━
async function calculateLiquidationRisk() {
  try {
    const resp = await fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT');
    const data = await resp.json();
    
    const oi = parseFloat(data.openInterest);
    
    // OI 증가 = 위험 증가
    // 임시: OI 기준 점수화
    const baseOI = 50000; // 기준값
    const oiRatio = oi / baseOI;
    
    let score = 50 + ((oiRatio - 1) * 25);
    score = Math.max(0, Math.min(100, score));
    
    return score;
    
  } catch (err) {
    console.error('OI 계산 실패:', err);
    return 50;
  }
}

// ━━━ ⑤ 펀딩비 과열도 ━━━
async function calculateFundingScore() {
  try {
    const resp = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT');
    const data = await resp.json();
    
    const fundingRate = parseFloat(data.lastFundingRate) * 100;
    
    // funding rate 0% = 50점
    // funding rate +0.1% = 75점 (롱 과열)
    // funding rate -0.1% = 25점 (숏 과열)
    let score = 50 + (fundingRate * 250);
    score = Math.max(0, Math.min(100, score));
    
    return score;
    
  } catch (err) {
    console.error('펀딩비 계산 실패:', err);
    return 50;
  }
}

// ━━━ ⑥ RSI 극단값 ━━━
async function calculateRSIExtreme() {
  try {
    // 간이 RSI 계산 (14봉)
    const resp = await fetch('https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=1h&limit=15');
    const data = await resp.json();
    
    let gains = 0, losses = 0;
    for (let i = 1; i < data.length; i++) {
      const change = parseFloat(data[i][4]) - parseFloat(data[i-1][4]);
      if (change > 0) gains += change;
      else losses += Math.abs(change);
    }
    
    const avgGain = gains / 14;
    const avgLoss = losses / 14;
    const rs = avgGain / (avgLoss || 1);
    const rsi = 100 - (100 / (1 + rs));
    
    // RSI 50 = 50점
    // RSI 70+ = 85점 (과매수)
    // RSI 30- = 15점 (과매도)
    let score = rsi;
    
    return score;
    
  } catch (err) {
    console.error('RSI 계산 실패:', err);
    return 50;
  }
}

// ━━━ TOP 코인 로딩 ━━━
async function loadTopCoins() {
  const coins = [];
  
  for (const symbol of CONFIG.TOP_COINS) {
    try {
      const resp = await fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${symbol}`);
      
      // 400 에러 체크 (Futures 미지원 심볼)
      if (!resp.ok) {
        console.warn(`${symbol} Futures 미지원 (${resp.status})`);
        continue;
      }
      
      const data = await resp.json();
      
      // API 에러 응답 체크
      if (data.code) {
        console.warn(`${symbol} API 에러: ${data.msg}`);
        continue;
      }
      
      const price = parseFloat(data.lastPrice);
      const change24h = parseFloat(data.priceChangePercent);
      
      // 유효성 검사
      if (isNaN(price) || isNaN(change24h)) {
        console.warn(`${symbol} 잘못된 데이터`);
        continue;
      }
      
      // 간이 점수 (복합 지표 간소화)
      const score = 50 + (change24h * 2);
      const grade = getGrade(Math.max(0, Math.min(100, score)));
      
      coins.push({
        symbol: symbol.replace('USDT', ''),
        price,
        change24h,
        score: Math.round(score),
        grade
      });
      
    } catch (err) {
      console.error(`${symbol} 로딩 실패:`, err.message);
      // 계속 진행 (다른 코인 로딩)
    }
  }
  
  // 최소 10개 이상 로딩 확인
  if (coins.length < 10) {
    console.warn(`경고: ${coins.length}개 코인만 로딩됨`);
  }
  
  STATE.coins = coins;
}

// ━━━ 등급 계산 ━━━
function getGrade(score) {
  for (const [key, val] of Object.entries(CONFIG.GRADES)) {
    if (score >= val.min && score < val.max) return key;
  }
  return 'C';
}

// ━━━ UI 렌더링 ━━━
function renderUI() {
  renderCompositeGauge();
  renderMarketStats();
  renderLongShort();
  renderPrediction();
  renderCoinList();
  updateTime();
}

// ━━━ 복합 게이지 렌더 ━━━
function renderCompositeGauge() {
  const score = STATE.compositeScore;
  const grade = getGrade(score);
  const gradeInfo = CONFIG.GRADES[grade];
  
  document.getElementById('compositeScore').textContent = score;
  document.getElementById('compositeScore').style.color = gradeInfo.color;
  document.getElementById('compositeGrade').textContent = gradeInfo.label;
  document.getElementById('compositeGrade').style.color = gradeInfo.color;
  
  document.getElementById('compositeFill').style.width = score + '%';
  document.getElementById('compositeFill').style.background = gradeInfo.color;
  
  // 지표 분해 렌더
  const grid = document.getElementById('indicatorsGrid');
  grid.innerHTML = '';
  
  const indicators = [
    { label: '가격 모멘텀', key: 'priceMomentum', weight: '35%' },
    { label: '레버리지 비율', key: 'leverageRatio', weight: '15%' },
    { label: '거래량 급증', key: 'volumeSurge', weight: '20%' },
    { label: '청산 위험', key: 'liquidationRisk', weight: '15%' },
    { label: '펀딩비', key: 'fundingRate', weight: '10%' },
    { label: 'RSI 극단', key: 'rsiExtreme', weight: '5%' }
  ];
  
  indicators.forEach(ind => {
    const val = STATE.indicators[ind.key] || 50;
    const color = val > 65 ? '#00ff88' : val > 50 ? '#ffd700' : val > 35 ? '#ff8c00' : '#ff4444';
    
    const card = document.createElement('div');
    card.className = 'indicator-card';
    card.innerHTML = `
      <div class="ind-label">${ind.label}</div>
      <div class="ind-value" style="color:${color}">
        ${Math.round(val)}
        <span style="font-size:0.52rem;color:var(--muted)">/ 100</span>
      </div>
      <div class="ind-weight">가중치 ${ind.weight}</div>
      <div class="ind-bar">
        <div class="ind-bar-fill" style="width:${val}%;background:${color}"></div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ━━━ 시장 통계 렌더 ━━━
function renderMarketStats() {
  if (!STATE.marketData) return;
  
  const m = STATE.marketData;
  
  document.getElementById('btcDom').textContent = m.btcDom.toFixed(1) + '%';
  document.getElementById('btcDomChg').textContent = '+0.01%';
  document.getElementById('btcDomChg').className = 'schg up';
  
  const mcap = (m.totalMcap / 1e9).toFixed(2) + 'B';
  document.getElementById('totalMcap').textContent = mcap;
  document.getElementById('mcapChg').textContent = m.mcapChange24h > 0 ? '+' + m.mcapChange24h.toFixed(2) + '%' : m.mcapChange24h.toFixed(2) + '%';
  document.getElementById('mcapChg').className = 'schg ' + (m.mcapChange24h > 0 ? 'up' : 'down');
}

// ━━━ 롱숏 렌더 ━━━
function renderLongShort() {
  if (!STATE.longShortRatio) return;
  
  const ls = STATE.longShortRatio;
  
  document.getElementById('lsRatio').textContent = ls.ratio.toFixed(2);
  document.getElementById('lsBarFill').style.width = ls.long + '%';
  document.getElementById('lsLongPct').textContent = ls.long.toFixed(1) + '%';
  document.getElementById('lsShortPct').textContent = ls.short.toFixed(1) + '%';
}

// ━━━ 7일 예측 렌더 ━━━
function renderPrediction() {
  const row = document.getElementById('predRow');
  row.innerHTML = '';
  
  // 간이 Monte Carlo (랜덤)
  const predictions = [
    { day: 1, dir: '→ 중립', chg: '+1.2%', prob: 0.52 },
    { day: 2, dir: '→ 중립', chg: '+0.8%', prob: 0.51 },
    { day: 3, dir: '▲ 상승', chg: '+2.1%', prob: 0.58 },
    { day: 4, dir: '→ 중립', chg: '+0.3%', prob: 0.50 },
    { day: 5, dir: '▼ 하락', chg: '-1.5%', prob: 0.45 },
    { day: 6, dir: '→ 중립', chg: '-0.2%', prob: 0.49 },
    { day: 7, dir: '▲ 상승', chg: '+1.8%', prob: 0.55 }
  ];
  
  predictions.forEach(p => {
    const item = document.createElement('div');
    item.className = 'day-item';
    
    const color = p.chg.startsWith('+') ? '#00ff88' : p.chg.startsWith('-') ? '#ff3355' : '#ffd700';
    
    item.innerHTML = `
      <div class="day-tag">D+${p.day}</div>
      <div class="mini-bar-wrap">
        <div class="mini-bar-fill" style="width:${p.prob*100}%;background:${color}"></div>
      </div>
      <div class="day-dir" style="color:${color}">${p.dir}</div>
      <div class="day-chg" style="color:${color}">${p.chg}</div>
    `;
    row.appendChild(item);
  });
}

// ━━━ 코인 리스트 렌더 ━━━
function renderCoinList() {
  const list = document.getElementById('coinList');
  list.innerHTML = '';
  
  STATE.coins.forEach(coin => {
    const card = document.createElement('div');
    card.className = 'coin-card';
    
    const chgClass = coin.change24h > 0 ? 'up' : coin.change24h < 0 ? 'down' : 'neu';
    const chgSymbol = coin.change24h > 0 ? '+' : '';
    
    card.innerHTML = `
      <div class="coin-left">
        <div class="coin-ico">${coin.symbol.slice(0,2)}</div>
        <div>
          <div class="csym">${coin.symbol}</div>
          <div class="coin-meta">
            <span class="${chgClass}">${chgSymbol}${coin.change24h.toFixed(2)}%</span>
          </div>
        </div>
      </div>
      <div style="flex:1"></div>
      <div class="coin-right">
        <div class="gbadge g${coin.grade}">${coin.grade}</div>
        <div class="score-val" style="color:${CONFIG.GRADES[coin.grade].color}">${coin.score}</div>
      </div>
    `;
    
    list.appendChild(card);
  });
}

// ━━━ 시간 업데이트 ━━━
function updateTime() {
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  document.getElementById('updateTime').textContent = time;
  STATE.lastUpdate = now;
}

// ━━━ 갱신 ━━━
async function triggerRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '갱신 중...';
  
  try {
    await loadMarketData();
    await loadLongShortRatio();
    await calculateCompositeScore();
    await loadTopCoins();
    renderUI();
    showInfo('✓ 데이터 갱신 완료');
  } catch (err) {
    showError('갱신 실패: ' + err.message);
  }
  
  btn.disabled = false;
  btn.textContent = '↺ 갱신';
}

// ━━━ 알림 ━━━
function showInfo(msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar info';
  bar.textContent = msg;
  setTimeout(() => {
    bar.className = 'status-bar';
  }, 3000);
}

function showError(msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar error';
  bar.textContent = msg;
  setTimeout(() => {
    bar.className = 'status-bar';
  }, 5000);
}

// ━━━ 앱 시작 ━━━
window.addEventListener('load', init);

// 자동 갱신 (5분마다)
setInterval(triggerRefresh, 5 * 60 * 1000);
</script>
